let activeFilter = 'all';
let openId = null;

function setFilter(btn) {
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  activeFilter = btn.dataset.f;
  render();
}

function toggle(id) {
  openId = openId === id ? null : id;
  render();
}

function render() {
  const q = document.getElementById('search').value.toLowerCase();
  const filtered = ANIMALS.filter(a => {
    const matchFilter = activeFilter === 'all' || a.status === activeFilter;
    const matchSearch = !q || a.name.toLowerCase().includes(q) || a.desc.toLowerCase().includes(q) || a.cat.toLowerCase().includes(q);
    return matchFilter && matchSearch;
  });

  const counts = { viable: ANIMALS.filter(a=>a.status==='viable').length, monitor: ANIMALS.filter(a=>a.status==='monitor').length, hard: ANIMALS.filter(a=>a.status==='hard').length, illegal: ANIMALS.filter(a=>a.status==='illegal').length };
  document.getElementById('stats').innerHTML = `
    <div class="scard"><div class="scard-lbl">Viable now</div><div class="scard-val" style="color:var(--color-text-success)">${counts.viable}</div></div>
    <div class="scard"><div class="scard-lbl">Watch list</div><div class="scard-val" style="color:var(--color-text-warning)">${counts.monitor}</div></div>
    <div class="scard"><div class="scard-lbl">Too hard (for now)</div><div class="scard-val" style="color:var(--color-text-secondary)">${counts.hard}</div></div>
    <div class="scard"><div class="scard-lbl">Not possible/legal</div><div class="scard-val" style="color:var(--color-text-danger)">${counts.illegal}</div></div>
  `;

  if (!filtered.length) {
    document.getElementById('list').innerHTML = '<div class="empty-state">No animals match this filter. Try a different search or category.</div>';
    return;
  }

  const spMap = { viable: ['sp-viable','Viable now'], monitor: ['sp-monitor','Watch list'], hard: ['sp-hard','Too hard for now'], illegal: ['sp-illegal','Not viable/legal'] };
  const bnMap = { hard: 'bn-hard', illegal: 'bn-illegal', viable: 'bn-viable', monitor: 'bn-monitor' };

  document.getElementById('list').innerHTML = filtered.map(a => {
    const [pillCls, pillLabel] = spMap[a.status];
    const isOpen = openId === a.id;
    const hasDetail = a.detail || a.basket;
    return `
    <div class="animal-card status-${a.status}" onclick="toggle(${a.id})" role="button" tabindex="0">
      <div class="card-top">
        <div style="font-size:20px;flex-shrink:0;margin-top:1px">${a.icon}</div>
        <div class="card-main">
          <div class="card-name-row">
            <span class="card-name">${a.name}</span>
            <span class="cat-tag">${a.cat}</span>
            <span class="status-pill ${pillCls}">${pillLabel}</span>
          </div>
          <div class="card-desc">${a.desc}</div>
        </div>
        <div class="card-right">
          <div class="revenue-tag">${a.revenue}</div>
          <div style="font-size:12px;color:var(--color-text-tertiary)">${isOpen ? '▲ less' : '▼ detail'}</div>
        </div>
      </div>
      ${hasDetail ? `<div class="card-detail ${isOpen ? 'open' : ''}">
        ${a.setup ? `<div class="detail-grid">
          <div class="detail-item"><div class="di-lbl">Setup cost</div><div class="di-val">${a.setup}</div></div>
          <div class="detail-item"><div class="di-lbl">Time to income</div><div class="di-val">${a.time}</div></div>
        </div>` : ''}
        ${a.detail ? `<p style="margin-top:10px;font-size:13px;color:var(--color-text-secondary);line-height:1.6">${a.detail}</p>` : ''}
        ${a.basket ? `<div class="basket-note ${bnMap[a.status]}">${a.basket}</div>` : ''}
      </div>` : ''}
    </div>`;
  }).join('');
}

render();
</script>
