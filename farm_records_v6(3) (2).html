<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Farm Records — 658 Lefthand Branch Rd</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600&family=Source+Sans+3:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
:root{
  --soil:#3d2b1f;--bark:#6b4c35;--straw:#c8a96e;--sage:#7a9e7e;
  --sage-dark:#4e7453;--sage-light:#b8d4ba;--cream:#f5f0e8;
  --cream-dark:#ede5d8;--rust:#b85c38;--text:#2a1f16;
  --text-mid:#5c4535;--text-light:#9a7d6a;
  --border:rgba(107,76,53,.15);--border-strong:rgba(107,76,53,.3);
  --red:#c0392b;--amber:#d68910;--green:#27ae60;
}
*{box-sizing:border-box;margin:0;padding:0;}
html{font-size:15px;}
body{font-family:'Source Sans 3',sans-serif;background:var(--cream);color:var(--text);min-height:100vh;}
.hdr{background:var(--soil);padding:.9rem 1.2rem;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100;box-shadow:0 2px 8px rgba(0,0,0,.25);}
.hdr-title{color:#f5f0e8;font-family:'Playfair Display',serif;font-size:1.1rem;font-weight:600;}
.hdr-sub{color:var(--straw);font-size:.72rem;margin-top:1px;}
.hdr-date{color:var(--straw);font-size:.72rem;text-align:right;}
.home-btn{display:flex;align-items:center;gap:.45rem;text-decoration:none;color:var(--cream);padding:.3rem .6rem;border-radius:6px;border:1px solid rgba(200,169,110,.25);transition:background .15s,border-color .15s;flex-shrink:0;}
.home-btn:hover{background:rgba(200,169,110,.15);border-color:rgba(200,169,110,.5);}
.home-logo{width:28px;height:28px;border-radius:4px;background:var(--straw);display:flex;align-items:center;justify-content:center;font-family:'Playfair Display',serif;font-size:.75rem;font-weight:900;color:var(--soil);line-height:1;}
.home-label{font-size:.65rem;font-weight:500;letter-spacing:.04em;line-height:1.2;opacity:.8;}
.nav{background:var(--bark);overflow-x:auto;display:flex;-webkit-overflow-scrolling:touch;border-bottom:2px solid var(--straw);scrollbar-width:none;}
.nav::-webkit-scrollbar{display:none;}
.nav-btn{flex-shrink:0;padding:.65rem .9rem;color:rgba(245,240,232,.6);font-size:.75rem;font-weight:500;cursor:pointer;border:none;background:none;white-space:nowrap;border-bottom:2px solid transparent;margin-bottom:-2px;transition:all .15s;display:flex;flex-direction:column;align-items:center;gap:2px;}
.nav-btn .ni{font-size:1rem;}
.nav-btn:hover{color:rgba(245,240,232,.85);}
.nav-btn.active{color:#f5f0e8;border-bottom-color:var(--straw);}
.main{max-width:800px;margin:0 auto;padding:1rem;}
.card{background:white;border-radius:10px;border:1px solid var(--border);overflow:hidden;margin-bottom:1rem;box-shadow:0 1px 4px rgba(0,0,0,.06);}
.card-hdr{padding:.85rem 1.1rem;display:flex;align-items:center;gap:.65rem;cursor:pointer;}
.card-icon{font-size:1.4rem;}
.card-title{font-size:.95rem;font-weight:600;}
.card-sub{font-size:.73rem;color:var(--text-light);margin-top:1px;}
.card-hdr-right{margin-left:auto;display:flex;align-items:center;gap:.4rem;}
.chevron{font-size:.75rem;color:var(--text-light);transition:transform .2s;}
.chevron.open{transform:rotate(180deg);}
.card-body{border-top:1px solid var(--border);}
.card-body.hidden{display:none;}
.sec-lbl{font-size:.63rem;font-weight:600;letter-spacing:.1em;text-transform:uppercase;color:var(--text-light);padding:.65rem 1.1rem .25rem;border-bottom:1px solid var(--border);}
.date-bar{background:var(--cream);padding:.45rem 1.1rem;display:flex;align-items:center;justify-content:space-between;font-size:.78rem;color:var(--text-mid);}
.date-bar input[type=date]{border:1px solid var(--border-strong);border-radius:5px;padding:.3rem .5rem;font-size:.78rem;color:var(--text);background:white;font-family:inherit;}
/* SPECIES GRID */
.sp-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(130px,1fr));gap:.45rem;padding:.75rem 1.1rem;}
.sp-cell{background:var(--cream);border:1px solid var(--border);border-radius:8px;padding:.55rem .75rem;}
.sp-name{font-size:.72rem;font-weight:600;color:var(--text-mid);display:flex;align-items:center;gap:.25rem;margin-bottom:.35rem;}
.sp-ctr{display:flex;align-items:center;justify-content:space-between;gap:.35rem;}
.sp-num{font-size:1.3rem;font-weight:700;color:var(--text);min-width:1.8rem;text-align:center;}
.pm{width:30px;height:30px;border-radius:6px;border:1px solid var(--border-strong);background:white;font-size:1rem;cursor:pointer;display:flex;align-items:center;justify-content:center;color:var(--bark);font-weight:700;-webkit-tap-highlight-color:transparent;user-select:none;}
.pm:active{background:var(--cream-dark);}
.sp-hint{font-size:.64rem;color:var(--text-light);text-align:center;margin-top:.2rem;}
/* DISP BUTTONS */
.disp-row{display:flex;gap:.35rem;padding:.45rem 1.1rem;flex-wrap:wrap;}
.disp-btn{flex:1;min-width:70px;padding:.38rem .4rem;border:1px solid var(--border-strong);border-radius:6px;background:white;font-size:.72rem;cursor:pointer;text-align:center;color:var(--text-mid);-webkit-tap-highlight-color:transparent;}
.disp-btn.sel{background:var(--sage-dark);color:white;border-color:var(--sage-dark);}
/* PARAM STRIP */
.param-strip{display:grid;grid-template-columns:repeat(auto-fill,minmax(90px,1fr));gap:.4rem;padding:.75rem 1.1rem;}
.param-cell{background:var(--cream);border:1px solid var(--border);border-radius:8px;padding:.55rem .6rem;}
.param-cell.ok{border-color:var(--green);background:#f0faf4;}
.param-cell.warn{border-color:var(--amber);background:#fef9ec;}
.param-cell.bad{border-color:var(--red);background:#fdf3f2;}
.p-lbl{font-size:.62rem;font-weight:600;letter-spacing:.06em;text-transform:uppercase;color:var(--text-light);}
.p-input{border:none;background:transparent;font-size:1.2rem;font-weight:700;color:var(--text);width:100%;padding:.1rem 0;font-family:inherit;}
.p-input:focus{outline:none;}
.p-unit{font-size:.62rem;color:var(--text-light);}
.p-status{font-size:.6rem;font-weight:600;margin-top:.15rem;}
.ok .p-status{color:var(--green);}
.warn .p-status{color:var(--amber);}
.bad .p-status{color:var(--red);}
/* IBC CHIPS */
.chips{display:flex;gap:.35rem;padding:.65rem 1.1rem;overflow-x:auto;scrollbar-width:none;}
.chip{flex-shrink:0;padding:.35rem .75rem;border:1px solid var(--border-strong);border-radius:20px;background:white;font-size:.75rem;cursor:pointer;color:var(--text-mid);-webkit-tap-highlight-color:transparent;}
.chip.sel{background:var(--bark);color:white;border-color:var(--bark);}
/* FORM ROWS */
.sel-row,.num-row{display:flex;align-items:center;gap:.6rem;padding:.38rem 1.1rem;}
.sel-row label,.num-row label{font-size:.8rem;color:var(--text-mid);flex:1;min-width:0;}
.sel-row select,.sel-row input,.num-row input{border:1px solid var(--border-strong);border-radius:6px;padding:.35rem .55rem;font-size:.8rem;font-family:inherit;color:var(--text);background:white;flex:0 0 auto;max-width:200px;}
.num-row input{width:90px;text-align:right;font-weight:600;}
.notes-row{padding:.4rem 1.1rem .7rem;}
.notes-row textarea{width:100%;border:1px solid var(--border-strong);border-radius:6px;padding:.45rem .65rem;font-size:.8rem;font-family:inherit;color:var(--text);background:white;resize:vertical;min-height:50px;}
.notes-row textarea::placeholder{color:var(--text-light);}
/* SAVE ROW */
.save-row{padding:.45rem 1.1rem .85rem;display:flex;gap:.45rem;}
.btn-save{flex:1;background:var(--sage-dark);color:white;border:none;border-radius:8px;padding:.65rem;font-size:.86rem;font-weight:600;cursor:pointer;font-family:inherit;-webkit-tap-highlight-color:transparent;}
.btn-save:active{background:var(--sage);}
.btn-photo{width:40px;height:40px;background:var(--cream-dark);border:1px solid var(--border-strong);border-radius:8px;display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:1rem;flex-shrink:0;}
/* RECORDS SECTION */
.rec-panel{border-top:1px solid var(--border);}
.rec-hdr{padding:.55rem 1.1rem;background:var(--cream-dark);display:flex;align-items:center;justify-content:space-between;cursor:pointer;}
.rec-hdr span{font-size:.76rem;font-weight:600;color:var(--text-mid);}
.rec-body{display:none;max-height:300px;overflow-y:auto;}
.rec-body.open{display:block;}
.rec-row{padding:.5rem 1.1rem;border-bottom:1px solid var(--border);display:flex;gap:.55rem;align-items:flex-start;}
.rec-row:last-child{border-bottom:none;}
.rec-date{font-size:.7rem;color:var(--text-light);white-space:nowrap;flex-shrink:0;width:60px;}
.rec-txt{flex:1;font-size:.78rem;color:var(--text);line-height:1.45;}
.rec-txt strong{color:var(--bark);}
.rec-txt .dim{color:var(--text-light);font-size:.7rem;}
.rec-del{color:var(--text-light);cursor:pointer;font-size:.78rem;flex-shrink:0;padding:.1rem .3rem;margin-top:1px;}
.rec-del:hover{color:var(--red);}
.empty{padding:1rem 1.1rem;font-size:.8rem;color:var(--text-light);text-align:center;font-style:italic;}
/* OVERVIEW */
.ov-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(140px,1fr));gap:.55rem;margin-bottom:.8rem;}
.ov-card{background:white;border:1px solid var(--border);border-radius:10px;padding:.75rem .85rem;cursor:pointer;transition:box-shadow .15s;}
.ov-card:hover{box-shadow:0 3px 10px rgba(0,0,0,.1);}
.ov-ico{font-size:1.6rem;margin-bottom:.25rem;}
.ov-name{font-size:.8rem;font-weight:600;}
.ov-stat{font-size:.7rem;color:var(--text-light);margin-top:2px;}
/* FINANCE */
.fin-strip{display:grid;grid-template-columns:1fr 1fr;gap:.45rem;padding:.75rem 1.1rem;}
.fin-card{background:var(--cream);border:1px solid var(--border);border-radius:7px;padding:.55rem .85rem;}
.fin-lbl{font-size:.65rem;text-transform:uppercase;letter-spacing:.08em;color:var(--text-light);margin-bottom:2px;}
.fin-val{font-size:1.2rem;font-weight:700;}
.fin-val.pos{color:var(--green);}
.fin-val.neg{color:var(--red);}
/* SPRAY TABLE */
.sp-table{width:100%;border-collapse:collapse;font-size:.76rem;}
.sp-table th{background:var(--cream-dark);padding:.38rem .7rem;text-align:left;font-size:.65rem;font-weight:600;text-transform:uppercase;letter-spacing:.07em;color:var(--text-mid);border-bottom:1px solid var(--border-strong);}
.sp-table td{padding:.42rem .7rem;border-bottom:1px solid var(--border);vertical-align:top;}
/* CURING */
.cure-item{background:var(--cream);border:1px solid var(--border);border-radius:8px;padding:.65rem .9rem;margin:.4rem 1.1rem;}
.cure-hdr{display:flex;justify-content:space-between;align-items:center;margin-bottom:.35rem;}
.cure-id{font-weight:700;font-size:.83rem;}
.cure-stage{font-size:.7rem;padding:.18rem .55rem;border-radius:10px;background:var(--sage-light);color:var(--sage-dark);}
.cure-meta{font-size:.71rem;color:var(--text-mid);display:flex;flex-wrap:wrap;gap:.5rem;}
.prog{height:5px;background:var(--border);border-radius:3px;margin-top:.45rem;overflow:hidden;}
.prog-fill{height:100%;background:var(--sage-dark);border-radius:3px;}
/* PHOTO STUB */
.photo-stub{margin:.4rem 1.1rem;background:var(--cream-dark);border:1.5px dashed var(--border-strong);border-radius:8px;padding:.7rem;text-align:center;cursor:pointer;font-size:.78rem;color:var(--text-light);}
.photo-stub input{display:none;}
.photo-prev{display:none;padding:.3rem 1.1rem;}
.photo-prev img{max-width:100%;border-radius:6px;max-height:100px;object-fit:cover;}
/* TOAST */
.toast{position:fixed;bottom:70px;left:50%;transform:translateX(-50%) translateY(16px);background:var(--soil);color:white;padding:.55rem 1.1rem;border-radius:20px;font-size:.8rem;opacity:0;transition:all .22s;pointer-events:none;z-index:999;white-space:nowrap;}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0);}
@media(max-width:480px){.main{padding:.65rem .55rem;}.sp-grid{grid-template-columns:1fr 1fr;}.param-strip{grid-template-columns:repeat(3,1fr);}}
</style>
</head>
<body>
<div class="hdr">
  <a class="home-btn" href="index.html" title="Back to Farm Hub">
    <div class="home-logo">PF</div>
    <div class="home-label">Phil's<br>Farm</div>
  </a>
  <div style="flex:1;padding-left:.75rem"><div class="hdr-title">658 Lefthand Branch Rd</div><div class="hdr-sub">Farm Records</div></div>
  <div class="hdr-date" id="hdr-date"></div>
</div>
<nav class="nav" id="nav"></nav>
<div class="main" id="content"></div>
<div class="toast" id="toast"></div>
<script>
// ── STORAGE ─────────────────────────────────────────────────────────────────
// Robust storage wrapper: tries localStorage, falls back to in-memory if
// the browser blocks it (private browsing, strict security, GitHub Pages CSP).
const KEY='farmRecords_v3';
let _memDB=null;        // in-memory fallback for main DB
let _memEnts=null;      // in-memory fallback for enterprises
let _storageOK=null;    // cached availability check

function _storageAvailable(){
  if(_storageOK!==null)return _storageOK;
  try{const t='__test__';localStorage.setItem(t,t);localStorage.removeItem(t);_storageOK=true;}
  catch(e){_storageOK=false;}
  return _storageOK;
}

function _lsGet(k){
  if(!_storageAvailable())return null;
  try{return localStorage.getItem(k);}catch(e){_storageOK=false;return null;}
}
function _lsSet(k,v){
  if(!_storageAvailable())return;
  try{localStorage.setItem(k,v);}catch(e){_storageOK=false;}
}

function initDB(){return{geese:[],goats:[],eggs:[],breeding:[],health:[],pasture:[],water:[],compost:[],finance:[],bas:[],loans:[],infra:[],oliveTree:[],oliveHarvest:[],oliveSpray:[],oliveCuring:[],bsflBatch:[],bsflColony:[],bsflSubstrate:[],bsflSales:[],aquaWater:[],aquaFish:[],aquaProduce:[],macTree:[],macGraft:[],hempCrop:[],waterfowl:[],rhizome:[]};}

function loadDB(){
  if(_memDB)return _memDB;           // already loaded this session
  try{const raw=_lsGet(KEY);_memDB=raw?JSON.parse(raw):initDB();}
  catch(e){_memDB=initDB();}
  return _memDB;
}
function saveDB(db){
  _memDB=db;                         // always keep in-memory copy current
  const json=JSON.stringify(db);
  _lsSet(KEY,json);
}
function addRec(key,rec){const db=loadDB();if(!db[key])db[key]=[];db[key].unshift({...rec,_id:Date.now(),_saved:new Date().toISOString()});saveDB(db);}
function delRec(key,id){const db=loadDB();db[key]=(db[key]||[]).filter(r=>r._id!==id);saveDB(db);}

// Show a one-time banner if localStorage is unavailable
function _maybeWarnStorage(){
  if(_storageAvailable()||document.getElementById('storage-warn'))return;
  const b=document.createElement('div');
  b.id='storage-warn';
  b.style.cssText='position:fixed;top:0;left:0;right:0;background:#d68910;color:#2a1f16;font-size:.78rem;padding:.45rem 1rem;text-align:center;z-index:9999;font-family:inherit;line-height:1.4';
  b.innerHTML='⚠️ <strong>Storage unavailable</strong> — records will be lost when you close this tab. Enable cookies/storage for this site to save data permanently. <button onclick="this.parentElement.remove()" style="margin-left:.75rem;padding:.15rem .55rem;border:1px solid currentColor;border-radius:4px;background:none;cursor:pointer;font-size:.75rem">Dismiss</button>';
  document.body.prepend(b);
}

// ── UTILS ────────────────────────────────────────────────────────────────────
function today(){return new Date().toISOString().slice(0,10);}
function fmtD(d){if(!d)return'';try{const dt=new Date(d+'T00:00:00');return dt.toLocaleDateString('en-AU',{day:'numeric',month:'short'});}catch(e){return d;}}
function toast(msg,ms=2200){const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),ms);}
function g(id){return document.getElementById(id);}
function v(id){return g(id)?.value||'';}

// ── COUNTERS ─────────────────────────────────────────────────────────────────
const C={};
function adj(id,delta){C[id]=Math.max(0,(C[id]||0)+delta);const el=g('cv-'+id);if(el)el.textContent=C[id];}
function spCell(id,name,icon,hint=''){
  C[id]=C[id]||0;
  return`<div class="sp-cell">
    <div class="sp-name"><span>${icon}</span>${name}</div>
    <div class="sp-ctr">
      <button class="pm" onclick="adj('${id}',-1)">−</button>
      <span class="sp-num" id="cv-${id}">${C[id]}</span>
      <button class="pm" onclick="adj('${id}',+1)">+</button>
    </div>
    ${hint?`<div class="sp-hint">${hint}</div>`:''}
  </div>`;}

// ── SHARED HTML BUILDERS ─────────────────────────────────────────────────────
function dateBar(id='entry-date'){return`<div class="date-bar"><span>Date</span><input type="date" id="${id}" value="${today()}"></div>`;}
function notesRow(id='notes',ph='Notes (optional)'){return`<div class="notes-row"><textarea id="${id}" placeholder="${ph}" rows="2"></textarea></div>`;}
function saveRow(fn,label='Save entry',photo=false){
  return`<div class="save-row">
    ${photo?`<label class="btn-photo" title="Photo (AI coming soon)"><input type="file" accept="image/*" capture="environment" id="photo-input" onchange="showPhoto(this)">📷</label>`:''}
    <button class="btn-save" onclick="${fn}">${label}</button>
  </div>`;}
function selRow(id,label,options,placeholder=''){
  const isArr=Array.isArray(options);
  if(isArr){return`<div class="sel-row"><label>${label}</label><select id="${id}">${options.map(o=>`<option>${o}</option>`).join('')}</select></div>`;}
  return`<div class="sel-row"><label>${label}</label><input type="text" id="${id}" placeholder="${placeholder||label}"></div>`;}
function numRow(id,label,ph='0'){return`<div class="num-row"><label>${label}</label><input type="number" id="${id}" placeholder="${ph}" inputmode="decimal" step="any"></div>`;}
function recSection(key,renderFn,label='Recent entries'){
  const db=loadDB();const recs=(db[key]||[]).slice(0,15);
  return`<div class="rec-panel">
    <div class="rec-hdr" onclick="toggleRecs(this)"><span>📋 ${label}</span><span>▼</span></div>
    <div class="rec-body">
      ${recs.length?recs.map(r=>{const line=renderFn(r);return line?`<div class="rec-row">
        <span class="rec-date">${fmtD(r.date||r.startDate||r.loadDate||r._saved?.slice(0,10))}</span>
        <span class="rec-txt">${line}</span>
        <span class="rec-del" onclick="delRec('${key}',${r._id});renderTab(activeTab)">✕</span>
      </div>`:''}).join(''):`<div class="empty">No entries yet</div>`}
    </div>
  </div>`;}
function toggleRecs(hdr){const b=hdr.nextElementSibling;b.classList.toggle('open');hdr.children[1].textContent=b.classList.contains('open')?'▲':'▼';}
function toggleBody(hdr){const b=hdr.nextElementSibling;const ch=hdr.querySelector('.chevron');b.classList.toggle('hidden');if(ch)ch.classList.toggle('open');}
function showPhoto(inp){const prev=g('photo-prev');if(inp.files?.[0]&&prev){prev.style.display='block';prev.querySelector('img').src=URL.createObjectURL(inp.files[0]);}}

// ── PARAM RANGES (aquaponics) ────────────────────────────────────────────────
const PR={
  ammonia:{name:'NH₃',unit:'ppm',ok:[0,.5],warn:[.5,1]},
  nitrite:{name:'NO₂',unit:'ppm',ok:[0,.25],warn:[.25,.5]},
  nitrate:{name:'NO₃',unit:'ppm',ok:[0,80],warn:[80,160]},
  ph:{name:'pH',unit:'',ok:[6.8,7.4],warn:[6.5,7.8]},
  dissolvedO2:{name:'DO',unit:'mg/L',ok:[6,20],warn:[5,6]},
  temp:{name:'Temp',unit:'°C',ok:[24,30],warn:[20,24]},
};
function pClass(k,val){
  if(!val&&val!==0)return'';
  const v=parseFloat(val),r=PR[k];if(!r)return'';
  const[o0,o1]=r.ok,[w0,w1]=r.warn||[];
  if(v>=o0&&v<=o1)return'ok';
  if(w0!==undefined&&((v>=w0&&v<o0)||(v>o1&&v<=w1)))return'warn';
  return'bad';
}
function pStatus(k,val){const c=pClass(k,val);return c==='ok'?'✓ Good':c==='warn'?'⚠ Check':c==='bad'?'✕ Act':'';}
function updateP(k,val){const cell=g('pc-'+k);const st=g('ps-'+k);if(!cell)return;cell.className='param-cell '+pClass(k,val);st.textContent=pStatus(k,val);}


// ── NAV ──────────────────────────────────────────────────────────────────────
const CORE_TABS=[
  {id:'overview',icon:'🏡',label:'Overview'},
  {id:'eggs',icon:'🥚',label:'Eggs'},
  {id:'aqua',icon:'🐟',label:'Aquaponics'},
  {id:'bsfl',icon:'🪲',label:'BSFL'},
  {id:'olive',icon:'🫒',label:'Olives'},
  {id:'mac',icon:'🌰',label:'Macadamia'},
  {id:'bees',icon:'🐝',label:'Bees'},
  {id:'hemp',icon:'🌿',label:'Hemp'},
  {id:'livestock',icon:'🐔',label:'Livestock'},
  {id:'finance',icon:'💰',label:'Finance'},
  {id:'all',icon:'📋',label:'All records'},
];
let activeTab='overview';
function allTabs(){
  const custom=loadEnterprises();
  return[
    ...CORE_TABS,
    ...custom.map(e=>({id:'ent_'+e.id,icon:e.icon,label:e.label})),
    {id:'export',icon:'📥',label:'Export'},
    {id:'enterprises',icon:'⚙',label:'Enterprises'},
  ];
}
function buildNav(){g('nav').innerHTML=allTabs().map(t=>`<button class="nav-btn ${t.id===activeTab?'active':''}" onclick="goTab('${t.id}')"><span class="ni">${t.icon}</span>${t.label}</button>`).join('');}
function goTab(id){activeTab=id;buildNav();renderTab(id);}
function renderTab(id){
  g('content').innerHTML='';

function lastStat(id,db){
  const ago=d=>{if(!d)return'No data';const days=Math.floor((Date.now()-new Date(d+'T00:00:00'))/86400000);return days===0?'Today':days===1?'Yesterday':`${days}d ago`;};
  switch(id){
    case'eggs':     {const r=db.eggs?.[0];return r?`${r.total||0} eggs — ${ago(r.date)}`:'No rounds yet';}
    case'aqua':     {const r=db.aquaWater?.[0];return r?`pH ${r.ph||'?'} · ${ago(r.date)}`:'No water logs';}
    case'bsfl':     {return`${(db.bsflBatch||[]).length} batches logged`;}
    case'olive':    {const r=db.oliveSpray?.[0];return r?`Spray ${ago(r.date)}`:'No entries';}
    case'mac':      {return`${(db.macTree||[]).length} trees · ${(db.macGraft||[]).length} graft records`;}
    case'bees':     {const r=(db.health||[]).find(h=>h.species?.includes('bee')||h.species?.includes('Bee')||h.species?.includes('hive'));return r?`Last check ${ago(r.date)}`:'No hive checks';}
    case'hemp':     {const r=db.hempCrop?.[0];return r?`${r.entryType} ${ago(r.date)}`:'No entries';}
    case'livestock':{const r=db.pasture?.[0];return r?`Last round ${ago(r.date)}`:'No rounds';}
    case'finance':  {return`${(db.finance||[]).length} transactions`;}
    default: {
      if(id.startsWith('ent_')){
        const eid=id.replace('ent_','');
        const ent=loadEnterprises().find(e=>e.id===eid);
        if(!ent)return'';
        const count=(ent.dbKeys||[]).reduce((a,k)=>a+(db[k]||[]).length,0);
        return`${count} record${count!==1?'s':''} logged`;
      }
      return'';
    }
  }
}

// ── AQUAPONICS — RAS/DWC SPLIT ───────────────────────────────────────────────
// RAS: 8,000L fish tank · DWC: 72m² float beds across 6 beds
// Sump: 2,000L shared reservoir
const AQ_TABS=['ras','dwc','fish','harvest'];
let aqTab='ras';

// RAS water params with Jade Perch ranges
const RAS_PARAMS={
  ph:   {label:'pH',      unit:'',     ok:[6.8,7.4],warn:[6.5,7.8],  dec:2},
  do_:  {label:'DO',      unit:'mg/L', ok:[6,20],   warn:[5,20],     dec:1},
  temp: {label:'Temp',    unit:'°C',   ok:[22,30],  warn:[18,32],    dec:1},
  tan:  {label:'NH₃',     unit:'mg/L', ok:[0,0.5],  warn:[0,1.5],   dec:2},
  no2:  {label:'NO₂',     unit:'mg/L', ok:[0,0.5],  warn:[0,1.0],   dec:2},
  no3:  {label:'NO₃',     unit:'mg/L', ok:[0,100],  warn:[0,150],   dec:0},
};
const DWC_PARAMS={
  ph:   {label:'pH',      unit:'',     ok:[6.0,7.0],warn:[5.8,7.4], dec:2},
  ec:   {label:'EC',      unit:'mS/cm',ok:[1.2,2.0],warn:[0.8,2.5], dec:2},
  temp: {label:'Temp',    unit:'°C',   ok:[18,30],  warn:[15,35],   dec:1},
};

function pClassAq(p,val){
  if(val===null||val===''||isNaN(val))return'';
  const v2=parseFloat(val);
  if(v2>=p.ok[0]&&v2<=p.ok[1])return'ok';
  if(v2>=p.warn[0]&&v2<=p.warn[1])return'warn';
  return'bad';
}

function renderAqua(){
  const db=loadDB();
  const lastRas=(db.aquaWater||[]).find(r=>r.loop==='RAS')||{};
  const lastDwc=(db.aquaWater||[]).find(r=>r.loop==='DWC')||{};
  const fishCount=(db.aquaFish||[]).filter(r=>r.entryType==='Stock').reduce((a,r)=>a+parseInt(r.count||0),0)
                 -(db.aquaFish||[]).filter(r=>r.entryType==='Mortality'||r.entryType==='Harvest').reduce((a,r)=>a+parseInt(r.count||0),0);
  const lastHarvest=(db.aquaProduce||[])[0];
  const tabs=AQ_TABS.map(t=>{
    const lbl={ras:'💧 RAS',dwc:'🌿 DWC',fish:'🐟 Fish',harvest:'🥬 Harvest'}[t];
    return`<button onclick="aqTab='${t}';renderAqua()" style="padding:.4rem .75rem;border:none;border-bottom:2px solid ${aqTab===t?'var(--sage-dark)':'transparent'};background:transparent;font-size:.8rem;font-weight:${aqTab===t?600:400};color:${aqTab===t?'var(--sage-dark)':'var(--text-mid)'};cursor:pointer">${lbl}</button>`;
  }).join('');

  else body=renderHarvestTab(db,lastHarvest);

  g('content').innerHTML=`
    <div class="card">
      <div style="display:flex;align-items:center;justify-content:space-between;padding:.5rem 1rem .3rem;border-bottom:1px solid var(--border)">
        <div style="display:flex;gap:0">${tabs}</div>
        <span style="font-size:.68rem;color:var(--text-light)">🐟 ${fishCount} fish est.</span>
      </div>
      ${body}
    </div>`;
}

function paramStrip(params, last, prefix, saveF){
  const keys=Object.keys(params);
  const strip=`<div style="display:grid;grid-template-columns:repeat(${Math.min(keys.length,3)},1fr);gap:6px;margin-bottom:.8rem">
    ${keys.map(k=>{
      const p=params[k];const lv=last[k];const cls=lv!==undefined?pClassAq(p,lv):'';
      const bg=cls==='ok'?'var(--green-lt)':cls==='warn'?'#FFF8EC':cls==='bad'?'var(--rust-lt,#FEF0EE)':'white';
      const col=cls==='ok'?'var(--green)':cls==='warn'?'#B87800':cls==='bad'?'var(--rust)':'var(--text-mid)';
      return`<div style="background:${bg};border:1px solid var(--border);border-radius:6px;padding:.5rem .6rem">
        <div style="font-size:.6rem;color:var(--text-light);text-transform:uppercase;letter-spacing:.08em;margin-bottom:.2rem">${p.label}</div>
        <input type="number" id="${prefix}${k}" placeholder="${lv!==undefined?lv:'—'}"
          style="width:100%;border:none;background:transparent;font-size:.95rem;font-weight:600;color:${col};font-family:inherit;padding:0"
          step="${Math.pow(10,-p.dec)}" oninput="updateAqParam('${prefix}','${k}',this.value,'${saveF}')">
        <div style="font-size:.58rem;color:var(--text-light)">${p.unit} · ${p.ok[0]}–${p.ok[1]}</div>
      </div>`;
    }).join('')}
  </div>`;
  return strip;
}

function updateAqParam(prefix,k,val,saveF){
  // live colour update
  const el=g(prefix+k);if(!el)return;
  const params=prefix==='ras-'?RAS_PARAMS:DWC_PARAMS;
  const p=params[k];if(!p)return;
  const cls=pClassAq(p,val);
  const bg=cls==='ok'?'var(--green-lt)':cls==='warn'?'#FFF8EC':cls==='bad'?'#FEF0EE':'white';
  const col=cls==='ok'?'var(--green)':cls==='warn'?'#B87800':cls==='bad'?'var(--rust)':'var(--text-mid)';
  el.parentElement.style.background=bg;el.style.color=col;
}

// ── FINANCE — P&L WITH ANNUAL TARGETS ───────────────────────────────────────
const FIN_TARGET_KEY='farmFinTargets_v1';
let _memTargets=null;
function loadTargets(){if(_memTargets)return _memTargets;try{const raw=_lsGet(FIN_TARGET_KEY);_memTargets=raw?JSON.parse(raw):{};}catch(e){_memTargets={};} return _memTargets;}
function saveTargets(t){_memTargets=t;_lsSet(FIN_TARGET_KEY,JSON.stringify(t));}

const ENT_LIST=[
  'Olive grove — table olives','BSFL — larvae','BSFL — frass','BSFL — gate fees',
  'Honey — Langstroth','Honey — native stingless','Commercial pollination',
  'Jade Perch — aquaponics','Aquaponics — produce','Free-range eggs',
  'Hemp seed / fibre','Finger lime','Nasturtium','Vanilla','Wasabi',
  'Macadamia — nuts','Macadamia — grafted plants','Waterfowl','Farm-wide / general'
];
const DEFAULT_TARGETS={
  'Olive grove — table olives':70000,'BSFL — larvae':18000,'BSFL — frass':8000,
  'BSFL — gate fees':12000,'Honey — Langstroth':15000,'Honey — native stingless':8000,
  'Commercial pollination':12000,'Jade Perch — aquaponics':20000,'Aquaponics — produce':8000,
  'Free-range eggs':9500,'Hemp seed / fibre':7500,'Finger lime':8000,'Nasturtium':2000,
  'Vanilla':4000,'Wasabi':3000,'Macadamia — nuts':3000,'Macadamia — grafted plants':4000,
  'Waterfowl':3000,'Farm-wide / general':0
};

let finTab='pl';
let finType='Expense';
function fmt(n){return n>=1000?Math.round(n).toLocaleString('en-AU'):Math.round(n).toString();}
function getCurrentFY(){const now=new Date();const yr=now.getMonth()>=6?now.getFullYear():now.getFullYear()-1;return{start:new Date(yr,6,1),end:new Date(yr+1,5,30),label:`${yr}-${String(yr+1).slice(2)}`};}

function renderFinance(){
  const db=loadDB(),recs=db.finance||[];
  const tabHtml=['pl','add','targets'].map(t=>`<button onclick="finTab='${t}';renderFinance()"
    style="padding:.4rem .9rem;border:none;border-bottom:2px solid ${t==='pl'?'PLCHECK':t==='add'?'ADDCHECK':'TGTCHECK'};background:transparent;font-size:.82rem;cursor:pointer">LBLCHECK</button>`).join('');
  // build tabs manually to avoid template issues
  const tabs=[{id:'pl',label:'P&L'},{id:'add',label:'+ Add'},{id:'targets',label:'Targets'}];
  const tb=tabs.map(t=>{
    const active=finTab===t.id;
    return`<button onclick="finTab='${t.id}';renderFinance()" style="padding:.4rem .9rem;border:none;border-bottom:2px solid ${active?'var(--sage-dark)':'transparent'};background:transparent;font-size:.82rem;font-weight:${active?600:400};color:${active?'var(--sage-dark)':'var(--text-mid)'};cursor:pointer">${t.label}</button>`;
  }).join('');
  let body='';
  if(finTab==='pl') body=renderPL(recs);
  else if(finTab==='add') body=renderAddTx();
  else body=renderTargetsEditor();
  g('content').innerHTML=`<div class="card"><div style="display:flex;align-items:center;justify-content:space-between;padding:.5rem 1rem .3rem;border-bottom:1px solid var(--border)"><div style="display:flex;gap:0">${tb}</div><span style="font-size:.7rem;color:var(--text-light)">${recs.length} transactions</span></div>${body}</div>`;
}

function renderPL(recs){
  const targets=loadTargets();const fy=getCurrentFY();
  const fyRecs=recs.filter(r=>{if(!r.date)return false;const d=new Date(r.date);return d>=fy.start&&d<=fy.end;});
  const byEnt={};ENT_LIST.forEach(e=>{byEnt[e]={inc:0,exp:0};});
  fyRecs.forEach(r=>{const e=r.enterprise||'Farm-wide / general';if(!byEnt[e])byEnt[e]={inc:0,exp:0};if(r.type==='Income')byEnt[e].inc+=parseFloat(r.amount||0);else byEnt[e].exp+=parseFloat(r.amount||0);});
  const totalInc=Object.values(byEnt).reduce((a,v)=>a+v.inc,0);
  const totalExp=Object.values(byEnt).reduce((a,v)=>a+v.exp,0);
  const totalNet=totalInc-totalExp;
  const totalTarget=ENT_LIST.reduce((a,e)=>a+(targets[e]??DEFAULT_TARGETS[e]??0),0);
  const pct=totalTarget>0?Math.min(100,totalNet/totalTarget*100):0;
  const barColor=pct>=80?'var(--green)':pct>=40?'#C8A018':'var(--rust)';
  let html=`<div style="display:grid;grid-template-columns:repeat(3,1fr);gap:1px;background:var(--border)">
    <div style="background:var(--cream);padding:.65rem;text-align:center"><div style="font-size:.62rem;color:var(--text-light);text-transform:uppercase;letter-spacing:.08em">Income</div><div style="font-size:1.05rem;font-weight:700;color:var(--green)">$${fmt(totalInc)}</div></div>
    <div style="background:var(--cream);padding:.65rem;text-align:center"><div style="font-size:.62rem;color:var(--text-light);text-transform:uppercase;letter-spacing:.08em">Expenses</div><div style="font-size:1.05rem;font-weight:700;color:var(--rust)">$${fmt(totalExp)}</div></div>
    <div style="background:var(--cream);padding:.65rem;text-align:center"><div style="font-size:.62rem;color:var(--text-light);text-transform:uppercase;letter-spacing:.08em">Net profit</div><div style="font-size:1.05rem;font-weight:700;color:${totalNet>=0?'var(--green)':'var(--rust)'}">$${fmt(totalNet)}</div></div>
  </div>
  <div style="padding:.7rem 1rem .5rem;border-bottom:1px solid var(--border)">
    <div style="display:flex;justify-content:space-between;font-size:.72rem;margin-bottom:.35rem"><span style="color:var(--text-mid);font-weight:600">Annual target — FY${fy.label}</span><span style="font-weight:700;color:${barColor}">${pct.toFixed(0)}% of $${fmt(totalTarget)}</span></div>
    <div style="height:8px;background:var(--border);border-radius:4px;overflow:hidden"><div style="height:100%;width:${pct}%;background:${barColor};border-radius:4px"></div></div>
  </div>
  <div style="padding:.4rem 1rem .2rem;font-size:.62rem;color:var(--text-light);text-transform:uppercase;letter-spacing:.08em;font-weight:600">Enterprise breakdown</div>`;
  ENT_LIST.filter(e=>{const t=targets[e]??DEFAULT_TARGETS[e]??0;const d=byEnt[e]||{inc:0,exp:0};return t>0||d.inc>0||d.exp>0;}).forEach(e=>{
    const d=byEnt[e]||{inc:0,exp:0};const net=d.inc-d.exp;const tgt=targets[e]??DEFAULT_TARGETS[e]??0;
    const ep=tgt>0?Math.min(100,net/tgt*100):null;const ec=ep===null?'var(--text-light)':ep>=80?'var(--green)':ep>=40?'#C8A018':'var(--rust)';
    html+=`<div style="padding:.5rem 1rem;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:.6rem">
      <div style="flex:1;min-width:0">
        <div style="font-size:.79rem;font-weight:600;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${e}</div>
        <div style="font-size:.67rem;color:var(--text-mid);margin-top:.1rem"><span style="color:var(--green)">+$${fmt(d.inc)}</span> · <span style="color:var(--rust)">-$${fmt(d.exp)}</span>${tgt>0?` · target $${fmt(tgt)}`:''}</div>
        ${tgt>0?`<div style="height:4px;background:var(--border);border-radius:2px;margin-top:.3rem;overflow:hidden"><div style="height:100%;width:${ep}%;background:${ec};border-radius:2px"></div></div>`:''}
      </div>
      <div style="text-align:right;flex-shrink:0"><div style="font-size:.9rem;font-weight:700;color:${net>=0?'var(--green)':'var(--rust)'}">$${fmt(net)}</div>${ep!==null?`<div style="font-size:.65rem;color:${ec};font-weight:600">${ep.toFixed(0)}%</div>`:''}</div>
    </div>`;
  });
  const recent=(recs||[]).slice(0,12);
  html+=`<div style="padding:.4rem 1rem .2rem;margin-top:.2rem;font-size:.62rem;color:var(--text-light);text-transform:uppercase;letter-spacing:.08em;font-weight:600">Recent transactions</div>`;
  html+=recent.length?recent.map(r=>`<div class="rec-row"><span class="rec-date">${fmtD(r.date)}</span><span class="rec-txt"><span style="color:${r.type==='Income'?'var(--green)':'var(--rust)'};font-weight:600">${r.type==='Income'?'+':'-'}$${parseFloat(r.amount||0).toFixed(2)}</span> · <strong>${r.enterprise||''}</strong> · ${r.description||''}<br><span class="dim">${r.taxCategory||''}</span></span><span class="rec-del" onclick="delRec('finance',${r._id});renderFinance()">✕</span></div>`).join(''):`<div class="empty">No transactions yet — use the Add tab</div>`;
  return html;
}

function renderAddTx(){
  return`<div class="card-body">${dateBar('fn-date')}<div class="disp-row" id="fn-type-row"><button class="disp-btn${finType==='Expense'?' sel':''}" onclick="setFT('Expense')">💸 Expense</button><button class="disp-btn${finType==='Income'?' sel':''}" onclick="setFT('Income')">💵 Income</button></div><div class="sel-row"><label>ATO category</label><select id="fn-cat"><optgroup label="Expenses">${['D1 – Repairs & maintenance','D2 – Capital improvement (depreciate)','D3 – Motor vehicle','D4 – Animal purchases','D5 – Feed and fodder','D6 – Vet and chemicals','D7 – Seeds and plants','D8 – Fencing and water','D9 – Fuel and oil','D10 – Wages and labour','D13 – Loan interest','D17 – Other deductible','D18 – Non-deductible'].map(o=>`<option>${o}</option>`).join('')}</optgroup><optgroup label="Income">${['I1 – Primary production sales','I2 – Livestock sales','I3 – Crop and produce sales','I4 – Honey and bee products','I5 – Other farm income','I6 – Govt grants / rebates'].map(o=>`<option>${o}</option>`).join('')}</optgroup></select></div><div class="sel-row"><label>Enterprise</label><select id="fn-ent">${ENT_LIST.map(o=>`<option>${o}</option>`).join('')}</select></div>${selRow('fn-desc','Description','fn-desc-txt','Brief description')}${selRow('fn-sup','Supplier / buyer','fn-sup-txt','Business name')}${numRow('fn-amt','Amount ($)','0.00')}${selRow('fn-gst','GST status',['GST inclusive (10%)','GST free','No GST — not registered'])}${selRow('fn-bas','BAS quarter',['Q1 — Jul to Sep','Q2 — Oct to Dec','Q3 — Jan to Mar','Q4 — Apr to Jun'])}${selRow('fn-pay','Payment',['Bank transfer','Card — business','Card — personal (claim back)','Cash'])}${notesRow('fn-notes','Details for accountant')}${saveRow('saveFinance()','💾 Save transaction')}</div>`;
}

function renderTargetsEditor(){
  const targets=loadTargets();
  const total=ENT_LIST.reduce((a,e)=>a+(targets[e]??DEFAULT_TARGETS[e]??0),0);
  const ok=total>=200000;
  let html=`<div style="padding:.6rem 1rem .4rem;font-size:.78rem;color:var(--text-mid);line-height:1.5;border-bottom:1px solid var(--border)">Set annual profit target per enterprise.<br><strong id="tgt-total" style="color:${ok?'var(--green)':'var(--rust)'}">Combined: $${fmt(total)}/yr ${ok?'✓ ≥$200K':'— below $200K goal'}</strong></div>`;
  ENT_LIST.filter(e=>(DEFAULT_TARGETS[e]??0)>0).forEach(e=>{
    const val=targets[e]??DEFAULT_TARGETS[e]??0;
    html+=`<div style="padding:.5rem 1rem;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:.7rem"><div style="flex:1;font-size:.79rem;font-weight:600">${e}</div><div style="display:flex;align-items:center;gap:.3rem"><span style="font-size:.72rem;color:var(--text-light)">$</span><input type="number" value="${val}" min="0" step="500" style="width:82px;padding:.3rem .4rem;border:1px solid var(--border-strong);border-radius:5px;font-size:.82rem;text-align:right;font-family:inherit" onchange="updateTarget('${e}',this.value)"></div></div>`;
  });
  html+=`<div style="padding:.6rem 1rem"><button onclick="resetTargets()" style="font-size:.75rem;padding:.3rem .8rem;border:1px solid var(--border-strong);border-radius:6px;background:white;cursor:pointer;color:var(--text-mid)">Reset to defaults</button></div>`;
  return html;
}

function updateTarget(ent,val){
  const t=loadTargets();t[ent]=parseFloat(val)||0;saveTargets(t);
  const total=ENT_LIST.reduce((a,e)=>a+(t[e]??DEFAULT_TARGETS[e]??0),0);
  const el=g('tgt-total');
  if(el){el.textContent=`Combined: $${fmt(total)}/yr ${total>=200000?'✓ ≥$200K':'— below $200K goal'}`;el.style.color=total>=200000?'var(--green)':'var(--rust)';}
}
function resetTargets(){saveTargets({});renderFinance();}
function setFT(t){finType=t;document.querySelectorAll('#fn-type-row .disp-btn').forEach(b=>b.classList.toggle('sel',(t==='Expense'&&b.textContent.includes('Expense'))||(t==='Income'&&b.textContent.includes('Income'))));}
function saveFinance(){const amt=parseFloat(v('fn-amt'))||0;if(!amt){toast('Enter an amount');return;}addRec('finance',{date:v('fn-date'),type:finType,taxCategory:v('fn-cat'),enterprise:v('fn-ent'),description:v('fn-desc-txt'),supplier:v('fn-sup-txt'),amount:amt,gstStatus:v('fn-gst'),basQuarter:v('fn-bas'),paymentMethod:v('fn-pay'),notes:v('fn-notes')});toast(`✓ ${finType} $${amt.toFixed(2)} logged`);finTab='pl';renderFinance();}

function renderAll(){
  const db=loadDB();const all=[];
  const km={eggs:'Eggs',aquaWater:'Water quality',aquaFish:'Fish',aquaProduce:'Grow bed',bsflBatch:'BSFL batch',bsflColony:'BSFL colony',bsflSales:'BSFL sales',oliveSpray:'Olive spray',oliveHarvest:'Olive harvest',oliveCuring:'Olive curing',macTree:'Mac tree',macGraft:'Mac graft',hempCrop:'Hemp',waterfowl:'Waterfowl',health:'Health',pasture:'Pasture',finance:'Finance',water:'Water',compost:'Compost',geese:'Geese',goats:'Goats'};
  Object.entries(km).forEach(([k,lbl])=>(db[k]||[]).forEach(r=>all.push({...r,_type:lbl,_key:k})));
  all.sort((a,b)=>new Date(b._saved||0)-new Date(a._saved||0));
  g('content').innerHTML=`
    <div style="margin-bottom:.6rem;font-size:.78rem;color:var(--text-mid)">${all.length} records across all enterprises</div>
    <div class="card">
      <div style="padding:.4rem 1.1rem;background:var(--cream-dark);font-size:.73rem;color:var(--text-mid)">Most recent first · tap ✕ to delete</div>
      ${all.slice(0,80).map(r=>`<div class="rec-row">
        <span class="rec-date"><span style="font-size:.65rem;color:var(--straw);display:block">${r._type}</span>${fmtD(r.date||r.startDate||r.loadDate||r._saved?.slice(0,10))}</span>
        <span class="rec-txt">${Object.entries(r).filter(([k])=>!k.startsWith('_')&&k!=='date'&&k!=='startDate'&&k!=='loadDate').slice(0,5).map(([k,v])=>v&&String(v)!=='0'&&String(v)!=='null'?`<span class="dim">${k}:</span> ${v}`:null).filter(Boolean).join(' · ')}</span>
        <span class="rec-del" onclick="delRec('${r._key}',${r._id});renderAll()">✕</span>
      </div>`).join('')}
      ${all.length>80?`<div class="empty">Showing 80 of ${all.length} records</div>`:''}
    </div>`;}

// ── CUSTOM ENTERPRISE STORAGE ─────────────────────────────────────────────────
const ENT_KEY='farmCustomEnterprises_v1';
function loadEnterprises(){
  if(_memEnts)return _memEnts;
  try{const raw=_lsGet(ENT_KEY);_memEnts=raw?JSON.parse(raw):[];}
  catch(e){_memEnts=[];}
  return _memEnts;
}
function saveEnterprises(list){_memEnts=list;_lsSet(ENT_KEY,JSON.stringify(list));}

// ── ENTERPRISES MANAGER ───────────────────────────────────────────────────────
let entSearchQ='',entCat='All',entModalId=null;

function renderEnterprises(){

  const bycat={};
  filtered.forEach(e=>{if(!bycat[e.cat])bycat[e.cat]=[];bycat[e.cat].push(e);});

  g('content').innerHTML=`
    <div class="card" style="margin-bottom:.6rem">
      <div class="card-hdr"><span class="card-icon">⚙</span>
        <div><div class="card-title">Manage enterprises</div>
          <div class="card-sub">Add tracking tabs for your active enterprises</div></div>
      </div>
      <div style="padding:.5rem 1.1rem .6rem">

          style="width:100%;padding:.4rem .7rem;border:1px solid var(--border-strong);border-radius:6px;font-size:.83rem;font-family:inherit;color:var(--text);background:white"
          value="${entSearchQ}" oninput="entSearchQ=this.value.toLowerCase();renderEnterprises()">
        <div style="display:flex;gap:.3rem;flex-wrap:wrap;margin-top:.5rem">
          ${cats.map(c=>`<button onclick="entCat='${c}';renderEnterprises()"
            style="padding:.25rem .65rem;border-radius:20px;border:1px solid var(--border-strong);background:${entCat===c?'var(--sage-dark)':'white'};color:${entCat===c?'white':'var(--text-mid)'};font-size:.73rem;cursor:pointer">${c}</button>`).join('')}
        </div>
      </div>
    </div>
    ${Object.entries(bycat).map(([cat,items])=>`
      <div style="font-size:.65rem;font-weight:600;letter-spacing:.1em;text-transform:uppercase;color:var(--text-light);padding:.4rem 0 .3rem">${cat}</div>
      ${items.map(e=>{
        const added=isAdded(e.id);
        return`<div class="card" style="margin-bottom:.45rem;${added?'opacity:.55':''}">
          <div style="padding:.7rem 1.1rem;display:flex;align-items:flex-start;gap:.7rem">
            <span style="font-size:1.5rem;flex-shrink:0">${e.icon}</span>
            <div style="flex:1;min-width:0">
              <div style="font-size:.88rem;font-weight:600">${e.label}</div>
              <div style="font-size:.73rem;color:var(--text-mid);margin:.1rem 0 .45rem;line-height:1.4">${e.desc}</div>
              <div style="display:flex;flex-wrap:wrap;gap:.3rem">
                ${e.purpose.map(p=>`<span style="font-size:.65rem;padding:.15rem .5rem;border-radius:4px;background:var(--sage-light);color:var(--sage-dark);font-weight:600">${p}</span>`).join('')}
              </div>
            </div>
            <div style="flex-shrink:0">
              ${added
                ?`<button onclick="removeEnterprise('${e.id}')" style="padding:.3rem .75rem;border:1px solid var(--border-strong);border-radius:6px;background:white;font-size:.75rem;cursor:pointer;color:var(--text-mid)">Remove</button>`
                :`<button onclick="openEntModal('${e.id}')" style="padding:.3rem .75rem;background:var(--sage-dark);color:white;border:none;border-radius:6px;font-size:.75rem;cursor:pointer">Add</button>`

            </div>
          </div>
        </div>`;
      }).join('')}
    `).join('')}
    ${custom.length?`
      <div style="font-size:.65rem;font-weight:600;letter-spacing:.1em;text-transform:uppercase;color:var(--text-light);padding:.8rem 0 .3rem">Your active enterprises</div>
      ${custom.map(e=>`
        <div class="card" style="margin-bottom:.4rem">
          <div style="padding:.65rem 1.1rem;display:flex;align-items:center;gap:.7rem">
            <span style="font-size:1.3rem">${e.icon}</span>
            <div style="flex:1">
              <div style="font-size:.85rem;font-weight:600">${e.label}</div>
              <div style="font-size:.7rem;color:var(--text-mid)">${(e.purpose||[]).join(' · ')}</div>
            </div>
            <button onclick="goTab('ent_${e.id}')" style="padding:.3rem .75rem;background:var(--bark);color:white;border:none;border-radius:6px;font-size:.75rem;cursor:pointer;margin-right:.35rem">Open</button>
            <button onclick="removeEnterprise('${e.id}')" style="padding:.3rem .6rem;border:1px solid var(--border-strong);border-radius:6px;background:white;font-size:.75rem;cursor:pointer;color:var(--text-mid)">✕</button>
          </div>
        </div>
      `).join('')}
    `:''}
    <div id="ent-modal" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:200;align-items:flex-end;justify-content:center">

          :`<input id="ef-${f.id}" type="${f.type}" placeholder="${f.ph||''}" style="width:100%;margin-top:.3rem;padding:.4rem .65rem;border:1px solid var(--border-strong);border-radius:6px;font-size:.83rem;font-family:inherit;color:var(--text)">`
        }

function closeEntModal(){const m=g('ent-modal');if(m)m.style.display='none';}

function confirmAddEnterprise(){
  const tpl=ENT_CATALOGUE.find(e=>e.id===entModalId);
  if(!tpl)return;
  const name=(g('ent-name')?.value||'').trim()||tpl.label;
  const activePurpose=tpl.purpose.filter(p=>g('pur-'+p)?.checked);
  const extras={};
  tpl.fields.forEach(f=>{extras[f.id]=g('ef-'+f.id)?.value||'';});
  const custom=loadEnterprises();
  const uid='e'+Date.now();
  custom.push({id:uid,templateId:tpl.id,label:name,icon:tpl.icon,cat:tpl.cat,purpose:activePurpose,dbKeys:tpl.dbKeys,config:extras});
  saveEnterprises(custom);
  const db=loadDB();
  tpl.dbKeys.forEach(k=>{if(!db[k])db[k]=[];});
  saveDB(db);
  closeEntModal();
  toast('✓ '+name+' tab added');
  buildNav();
  goTab('ent_'+uid);
}

function removeEnterprise(idOrTplId){
  const custom=loadEnterprises();
  const ent=custom.find(e=>e.id===idOrTplId||e.templateId===idOrTplId);
  if(!ent)return;
  if(!confirm('Remove "'+ent.label+'" tab? Your logged records are kept.'))return;
  saveEnterprises(custom.filter(e=>e.id!==ent.id));
  toast(ent.label+' removed');
  buildNav();
  if(activeTab==='ent_'+ent.id)goTab('overview');
  else renderEnterprises();
}

// ── CUSTOM ENTERPRISE TAB RENDERER ───────────────────────────────────────────
function renderCustomEnt(entId){
  const custom=loadEnterprises();
  const ent=custom.find(e=>e.id===entId);
  if(!ent){g('content').innerHTML='<div class="empty">Enterprise not found</div>';return;}
  const p=ent.purpose||[];
  const db=loadDB();
  const dbKey=ent.dbKeys?.[0]||('custom_'+entId);

  let formRows=dateBar('ce-date');

  if(p.includes('eggs')){
    formRows+=`<div class="sec-lbl">Eggs collected today</div><div class="sp-grid">${spCell('ce-eggs','Eggs','🥚')}</div>`;
  }
  if(p.includes('breeding')||p.includes('sales')){
    const evts=[
      ...(p.includes('breeding')?['Clutch set','Hatch','Pairing made','Offspring weaned','Offspring sold']:[]),
      ...(p.includes('sales')?['Sale','Stock take','Enquiry']:[]),
      'Health check','Death','New animal'
    ];
    formRows+=selRow('ce-event','Event',evts);
    formRows+=numRow('ce-count','Count / quantity','0');
    formRows+=numRow('ce-revenue','Revenue ($)','0');
  }
  if(p.includes('meat')){
    formRows+=selRow('ce-meat-event','Event',['Weight check','Batch started','Processed','Sold — whole','Sold — cuts','Death','Health treatment']);
    formRows+=numRow('ce-weight','Weight (kg)','0');
    formRows+=numRow('ce-count2','Count','0');
    formRows+=numRow('ce-revenue2','Revenue ($)','0');
  }
  if(p.includes('dairy')){
    formRows+=numRow('ce-milk','Milk yield (L)','0');
    formRows+=selRow('ce-dairy-event','Event',['Morning milk','Evening milk','Kidding','Dry off','Health check']);
  }
  if(p.includes('produce')||p.includes('fibre')||p.includes('oil')){
    formRows+=numRow('ce-yield','Yield / harvest (kg)','0');
    formRows+=numRow('ce-revenue3','Revenue ($)','0');
  }
  if(p.includes('feed')){
    formRows+=selRow('ce-feed-event','Entry type',['Substrate added','Harvest','Colony check','Sale']);
    formRows+=numRow('ce-yield2','Output (kg)','0');
    formRows+=numRow('ce-revenue4','Revenue ($)','0');
  }
  if(p.includes('health')){
    formRows+=selRow('ce-health','Condition',['Excellent','Good','Fair — note below','Needs attention','Treatment applied']);
  }
  formRows+=notesRow('ce-notes');
  formRows+=saveRow("saveCustomEnt('"+entId+"')",'💾 Log entry');

  const cfgLines=Object.entries(ent.config||{}).filter(([,v])=>v).map(([k,v])=>k.replace(/_/g,' ')+': <strong>'+v+'</strong>').join(' · ');

  g('content').innerHTML=`
    <div class="card">
      <div class="card-hdr">
        <span class="card-icon">${ent.icon}</span>
        <div>
          <div class="card-title">${ent.label}</div>
          ${cfgLines?`<div class="card-sub" style="line-height:1.5">${cfgLines}</div>`:''}
        </div>
        <div class="card-hdr-right">
          <span style="font-size:.65rem;padding:.2rem .5rem;border-radius:10px;background:var(--sage-light);color:var(--sage-dark)">${p.join(' · ')}</span>
        </div>
      </div>
      <div class="card-body">${formRows}</div>
      ${recSection(dbKey,r=>{
        const parts=[];
        const eggVal=r.eggs||C['ce-eggs'];
        if(eggVal&&String(eggVal)!=='0')parts.push('🥚 '+eggVal);
        if(r.event)parts.push('<strong>'+r.event+'</strong>');
        if(r.meat_event)parts.push('<strong>'+r.meat_event+'</strong>');
        if(r.feed_event)parts.push('<strong>'+r.feed_event+'</strong>');
        if(r.dairy_event)parts.push('<strong>'+r.dairy_event+'</strong>');
        if(r.count&&r.count!='0')parts.push('×'+r.count);
        if(r.weight&&r.weight!='0')parts.push(r.weight+'kg');
        if(r.milk&&r.milk!='0')parts.push(r.milk+'L milk');
        if(r.yield&&r.yield!='0')parts.push(r.yield+'kg yield');
        if(r.revenue&&r.revenue!='0')parts.push('$'+r.revenue);
        if(r.revenue2&&r.revenue2!='0')parts.push('$'+r.revenue2);
        if(r.revenue3&&r.revenue3!='0')parts.push('$'+r.revenue3);
        if(r.revenue4&&r.revenue4!='0')parts.push('$'+r.revenue4);
        if(r.health)parts.push(r.health);
        if(r.notes)parts.push('<span class="dim">'+r.notes+'</span>');
        return parts.join(' · ')||'Entry';
      },'Recent entries')}
    </div>`;
}

function saveCustomEnt(entId){
  const ent=loadEnterprises().find(e=>e.id===entId);
  if(!ent)return;
  const dbKey=ent.dbKeys?.[0]||('custom_'+entId);
  const p=ent.purpose||[];
  const rec={date:v('ce-date'),notes:v('ce-notes')};
  if(p.includes('eggs'))rec.eggs=C['ce-eggs']||0;
  if(p.includes('breeding')||p.includes('sales')){rec.event=v('ce-event');rec.count=v('ce-count');rec.revenue=v('ce-revenue');}
  if(p.includes('meat')){rec.meat_event=v('ce-meat-event');rec.weight=v('ce-weight');rec.count=v('ce-count2');rec.revenue2=v('ce-revenue2');}
  if(p.includes('dairy')){rec.milk=v('ce-milk');rec.dairy_event=v('ce-dairy-event');}
  if(p.includes('produce')||p.includes('fibre')||p.includes('oil')){rec.yield=v('ce-yield');rec.revenue3=v('ce-revenue3');}
  if(p.includes('feed')){rec.feed_event=v('ce-feed-event');rec.yield2=v('ce-yield2');rec.revenue4=v('ce-revenue4');}
  if(p.includes('health'))rec.health=v('ce-health');
  addRec(dbKey,rec);
  toast('✓ Entry logged');
  renderCustomEnt(entId);
}

// ── CSV EXPORT ────────────────────────────────────────────────────────────────
const DB_KEY_LABELS={
  eggs:'Eggs',aquaWater:'Aqua — water quality',aquaFish:'Aqua — fish',aquaProduce:'Aqua — grow bed',
  bsflBatch:'BSFL — batches',bsflColony:'BSFL — colony',bsflSubstrate:'BSFL — substrate',bsflSales:'BSFL — sales',
  oliveSpray:'Olive — spray diary',oliveHarvest:'Olive — harvest',oliveCuring:'Olive — curing',oliveTree:'Olive — trees',
  macTree:'Macadamia — trees',macGraft:'Macadamia — propagation',
  health:'Health & treatments',pasture:'Pasture & rounds',waterfowl:'Waterfowl',
  finance:'Finance',hempCrop:'Hemp',water:'Water log',compost:'Compost',
  geese:'Geese',goats:'Goats',breeding:'Breeding',bas:'BAS',loans:'Loans',infra:'Infrastructure',
};

function smartExportKeys(){
  const db=loadDB();
  const custom=loadEnterprises();
  const active=new Set();
  Object.keys(DB_KEY_LABELS).forEach(k=>{if((db[k]||[]).length>0)active.add(k);});
  custom.forEach(e=>(e.dbKeys||[]).forEach(k=>{if((db[k]||[]).length>0)active.add(k);}));
  return active;
}

let exportSelections=null;

function renderExport(){
  const db=loadDB();
  const custom=loadEnterprises();
  if(!exportSelections)exportSelections=new Set(smartExportKeys());
  const customKeyLabels={};
  custom.forEach(e=>(e.dbKeys||[]).forEach(k=>{if(!DB_KEY_LABELS[k])customKeyLabels[k]=e.label+' — records';}));
  const allKeys={...DB_KEY_LABELS,...customKeyLabels};
  const totalRecs=Object.values(db).reduce((a,v)=>a+(Array.isArray(v)?v.length:0),0);

  g('content').innerHTML=`
    <div class="card">
      <div class="card-hdr"><span class="card-icon">📥</span>
        <div><div class="card-title">Export to CSV</div>
          <div class="card-sub">${totalRecs} total records · select sections below</div></div>
      </div>
      <div style="padding:.65rem 1.1rem .4rem;font-size:.78rem;color:var(--text-mid);line-height:1.5">
        Sections with data are pre-selected. Each section downloads as a separate CSV file.
      </div>
      <div style="padding:.3rem 1.1rem .55rem;display:flex;gap:.45rem">
        <button onclick="selectAllExport(true)" style="padding:.3rem .75rem;border:1px solid var(--border-strong);border-radius:6px;font-size:.75rem;cursor:pointer;background:white;color:var(--text-mid)">Select all</button>
        <button onclick="selectAllExport(false)" style="padding:.3rem .75rem;border:1px solid var(--border-strong);border-radius:6px;font-size:.75rem;cursor:pointer;background:white;color:var(--text-mid)">Clear all</button>
      </div>
      <div style="border-top:1px solid var(--border)">
        ${Object.entries(allKeys).map(([k,lbl])=>{
          const count=(db[k]||[]).length;
          const sel=exportSelections.has(k);
          const isCustom=!!customKeyLabels[k];
          return`<label style="display:flex;align-items:center;gap:.75rem;padding:.55rem 1.1rem;border-bottom:1px solid var(--border);cursor:pointer;background:${sel?'#f5faf5':'white'}">
            <input type="checkbox" id="ex-${k}" ${sel?'checked':''} onchange="toggleExportKey('${k}',this.checked)" style="accent-color:var(--sage-dark);width:16px;height:16px;flex-shrink:0">
            <span style="flex:1;font-size:.82rem;font-weight:${sel?'600':'400'}">${lbl}</span>
            <span style="font-size:.72rem;padding:.15rem .5rem;border-radius:10px;background:${count>0?'var(--sage-light)':'var(--border)'};color:${count>0?'var(--sage-dark)':'var(--text-light)'}">${count} row${count!==1?'s':''}</span>
            ${isCustom?`<span style="font-size:.62rem;padding:.1rem .4rem;border-radius:4px;background:var(--cream-dark);color:var(--text-light)">custom</span>`:''}
          </label>`;
        }).join('')}
      </div>
      <div style="padding:.75rem 1.1rem;display:flex;gap:.5rem">
        <button onclick="runExport()" style="flex:1;padding:.65rem;background:var(--sage-dark);color:white;border:none;border-radius:8px;font-size:.86rem;font-weight:600;cursor:pointer">
          📥 Download ${exportSelections.size} CSV file${exportSelections.size!==1?'s':''}
        </button>
      </div>
      <div style="padding:0 1.1rem .75rem;font-size:.71rem;color:var(--text-light);line-height:1.5">
        Named by section + today's date. Open in Excel, Google Sheets, or forward to your accountant.
      </div>
    </div>
  `;
}

function toggleExportKey(k,checked){
  if(checked)exportSelections.add(k);else exportSelections.delete(k);
  renderExport();
}
function selectAllExport(sel){
  const db=loadDB();
  const custom=loadEnterprises();
  const customKeyLabels={};
  custom.forEach(e=>(e.dbKeys||[]).forEach(k=>{if(!DB_KEY_LABELS[k])customKeyLabels[k]=true;}));
  const all={...DB_KEY_LABELS,...customKeyLabels};
  exportSelections=sel?new Set(Object.keys(all)):new Set();
  renderExport();
}

function runExport(){
  if(!exportSelections||!exportSelections.size){toast('Select at least one section');return;}
  const db=loadDB();
  const dateStr=new Date().toISOString().slice(0,10);
  let downloaded=0;
  exportSelections.forEach(k=>{
    const rows=db[k]||[];
    if(!rows.length)return;
    const allCols=new Set();
    rows.forEach(r=>Object.keys(r).filter(c=>!c.startsWith('_')).forEach(c=>allCols.add(c)));
    const cols=[...allCols];
    const lines=[cols.map(c=>JSON.stringify(c)).join(',')];
    rows.forEach(r=>lines.push(cols.map(c=>JSON.stringify(String(r[c]??''))).join(',')));
    const blob=new Blob([lines.join('\n')],{type:'text/csv'});
    const a=document.createElement('a');
    const lbl=(DB_KEY_LABELS[k]||k).replace(/[^a-zA-Z0-9 ]/g,'').replace(/\s+/g,'_');
    a.href=URL.createObjectURL(blob);
    a.download=lbl+'_'+dateStr+'.csv';
    a.click();
    URL.revokeObjectURL(a.href);
    downloaded++;
  });
  if(!downloaded)toast('No data in selected sections');
  else toast('✓ '+downloaded+' CSV file'+(downloaded!==1?'s':'')+' downloaded');
}

_maybeWarnStorage();

</script>
